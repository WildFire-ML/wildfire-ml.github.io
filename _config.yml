# Basic Site Settings
locale: "en-US"
site_theme: "ember"
title: "Wildfire ML Lab"
title_separator: "-"
name: &name "Wildfire ML Lab"
description: &description "Wildfire machine learning research at the University of Alberta"
url: https://wildfire-ml.github.io
baseurl: ""
repository: "wildfire-ml/wildfire-ml.github.io"

# Site Author
author:
  avatar: "profile.png"
  name: "Wildfire ML Lab"
  bio: "The Wildfire ML lab is led by Dr. Jeff Boisvert in the Department of Civil and Environmental Engineering at the University of Alberta. Our interdisciplinary research develops machine learning and remote sensing methods that address challenges in forestry, wildfire science, wildfire preparedness, and wildfire response."
  location: "Edmonton, AB"
  employer: "University of Alberta"
  github: "wildfire-ml"
  googlescholar:
  orcid:
  email:

# Publication categories
publication_category:
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
breadcrumbs: false
words_per_minute: 160
future: false
read_more: "disabled"
talkmap_link: false

# Analytics
analytics:
  provider: "false"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - Dockerfile
  - Gemfile
  - LICENSE
  - node_modules
  - package.json*
  - README
  - tmp
  - vendor
  - talkmap
  - talkmap.ipynb
  - talkmap.py
  - talkmap_out.ipynb
  - markdown_generator
  - scripts
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  people:
    output: true
    permalink: /:collection/:path/

# Page defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: false
      share: false
  - scope:
      path: ""
      type: people
    values:
      layout: single
      author_profile: true
      share: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
