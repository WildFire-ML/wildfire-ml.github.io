# =============================================================================
# WILDFIRE ML LAB - SITE CONFIGURATION
# =============================================================================
# This file controls the basic settings of the website.
# Edit the values under each section to update site info, author details, etc.
# Lines starting with # are comments and are ignored by Jekyll.
# =============================================================================

# --- Basic Site Info ---
locale:           "en-US"
site_theme:       "ember"        # Only "ember" is included. Do not change.
title:            "Wildfire ML Lab"
title_separator:  "-"
name:             "Wildfire ML Lab"
description:      "Wildfire machine learning research at the University of Alberta"
url:              https://wildfire-ml.github.io
baseurl:          ""
repository:       "wildfire-ml/wildfire-ml.github.io"

# --- Sidebar Author Profile ---
# This appears in the left sidebar on every page.
author:
  avatar:       "profile.png"   # Image filename inside /images/
  name:         "Wildfire ML Lab"
  bio:          "The Wildfire ML lab is led by Dr. Jeff Boisvert in the Department of Civil and Environmental Engineering at the University of Alberta. Our interdisciplinary research develops machine learning and remote sensing methods that address challenges in forestry, wildfire science, wildfire preparedness, and wildfire response."
  location:     "Edmonton, AB"
  employer:     "University of Alberta"
  github:       "wildfire-ml"   # GitHub username (no @)
  googlescholar:                # Paste full URL here if desired
  orcid:                        # Paste full URL here if desired
  email:                        # e.g. labname@ualberta.ca

# --- Publication Categories ---
# Controls how publications are grouped on the Publications page.
# Add or remove categories here as needed.
publication_category:
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# --- Site Settings ---
breadcrumbs:      false
words_per_minute: 160
future:           false
read_more:        "disabled"

# --- Analytics ---
# Set provider to "google-analytics-4" and add your tracking ID to enable.
analytics:
  provider: "false"
  # google:
  #   tracking_id: "G-XXXXXXXXXX"

# --- Jekyll Configuration ---
# You should not need to edit anything below this line.

include:
  - .htaccess
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .devcontainer
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - Dockerfile
  - Gemfile
  - LICENSE
  - node_modules
  - package.json
  - README.md
  - tmp
  - vendor
  - markdown_generator
  - scripts
  - talkmap
  - talkmap.ipynb
  - talkmap.py
  - talkmap_out.ipynb
  - todo.txt
  - docker-compose.yaml
  - CONTRIBUTING.md
  - _drafts

keep_files:
  - .git

encoding:       "utf-8"
markdown_ext:   "markdown,mkdown,mkdn,mkd,md"

# --- Markdown ---
markdown:    kramdown
highlighter: rouge
lsi:         false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input:          GFM
  hard_wrap:      false
  auto_ids:       true
  footnote_nr:    1
  entity_output:  as_char
  toc_levels:     1..6
  smart_quotes:   lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# --- Collections ---
# "publications" and "people" are content folders that work like _posts.
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  people:
    output: true
    permalink: /:collection/:path/

# --- Page Defaults ---
# Sets default layout and sidebar behaviour per content type.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout:         single
      author_profile: true
      read_time:      true
      share:          false
      related:        false
  - scope:
      path: ""
      type: pages
    values:
      layout:         single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout:         single
      author_profile: false
      share:          false
  - scope:
      path: ""
      type: people
    values:
      layout:         single
      author_profile: true
      share:          false

# --- Sass/SCSS ---
sass:
  sass_dir: _sass
  style:    compressed

# --- Permalinks & Timezone ---
permalink: /:categories/:title/
timezone:  Etc/UTC

# --- Plugins ---
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from

whitelist:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from

# --- HTML Compression ---
compress_html:
  clippings: all
  ignore:
    envs: development
